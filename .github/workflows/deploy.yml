name: Deploy HQ Orchestration

on:
  push:
    branches: [master]
    paths:
      - "orchestrator/**"
      - "scripts/**"
      - "runbooks/**"
      - "org-chart/**"
      - "llm/**"
      - "templates/**"
      - "features/**"
      - "dashboards/**"
      - "qa-suites/**"
      - "policies/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: hq-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy HQ automation to production
        uses: appleboy/ssh-action@v1.0.3
        env:
          HUBGIT_PAT: ${{ secrets.HUBGIT_PAT }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          envs: HUBGIT_PAT,GITHUB_SHA,GITHUB_ACTOR
          script: |
            set -euo pipefail

            DEPLOY_DIR="${HQ_DEPLOY_DIR:-$HOME/copilot-sessions-hq}"
            REPO_URL="https://${HUBGIT_PAT}@github.com/keithaumiller/copilot-sessions-hq.git"

            echo "🚀 Deploying HQ orchestrator commit ${GITHUB_SHA:0:8} as ${GITHUB_ACTOR}"
            echo "📁 Deploy dir: $DEPLOY_DIR"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Cloning repository..."
              mkdir -p "$(dirname "$DEPLOY_DIR")"
              git clone --branch master "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch --prune origin master
            git checkout master
            git reset --hard origin/master
            git clean -fd

            echo "Installing Python dependencies..."
            python3 -m venv orchestrator/.venv
            orchestrator/.venv/bin/pip install --upgrade pip >/dev/null
            orchestrator/.venv/bin/pip install -r orchestrator/requirements.txt >/dev/null

            chmod +x scripts/*.sh || true

            export HQ_AGENTIC_BACKEND="${HQ_AGENTIC_BACKEND:-auto}"
            export BEDROCK_ASSIST_SCRIPT="${BEDROCK_ASSIST_SCRIPT:-$DEPLOY_DIR/scripts/bedrock-assist.sh}"
            echo "GenAI backend mode: $HQ_AGENTIC_BACKEND"
            if [ -x "$BEDROCK_ASSIST_SCRIPT" ]; then
              echo "✅ Bedrock assistant script detected: $BEDROCK_ASSIST_SCRIPT"
            else
              echo "⚠️ Bedrock assistant script missing or not executable: $BEDROCK_ASSIST_SCRIPT"
              echo "⚠️ If Copilot CLI is unavailable, agent execution may fail unless this script is present"
            fi

            echo "Ensuring org automation is enabled..."
            ./scripts/org-control.sh enable --reason "deploy workflow" --by "github-actions" --no-converge

            echo "Stopping loops before restart..."
            ./scripts/hq-automation.sh stop || true

            if command -v systemctl >/dev/null 2>&1 && systemctl --user show-environment >/dev/null 2>&1; then
              echo "Starting orchestrator via systemd user service..."
              ./scripts/install-systemd-orchestrator.sh
            else
              echo "systemd user service unavailable; starting loop wrapper..."
              ./scripts/orchestrator-loop.sh start 60
            fi

            ./scripts/publish-forseti-agent-tracker-loop.sh start 60 || true
            ./scripts/auto-checkpoint-loop.sh start 7200 || true

            echo "Installing cron watchdog for continuous HQ convergence..."
            ./scripts/install-cron-hq-automation.sh || true

            echo "Running one immediate watchdog pass (convergence + suggestion intake)..."
            ./scripts/hq-automation-watchdog.sh || true

            echo "Running one dry orchestrator tick for validation..."
            orchestrator/.venv/bin/python orchestrator/run.py --once --no-publish --agent-cap 0 --kpi-interval 300 --release-cycle-interval 300 --log-file inbox/responses/orchestrator-latest.log

            echo "Running runtime verification checks..."
            chmod +x scripts/*.sh || true
            ./scripts/verify-hq-runtime.sh --strict

            echo "Deployment status:"
            ./scripts/hq-automation.sh status
            tail -n 1 inbox/responses/orchestrator-latest.log || true
