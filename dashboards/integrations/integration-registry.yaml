entries:
  - id: aws-bedrock
    name: AWS Bedrock
    domain: ai
    purpose: Primary AI inference for Forseti chat and AI workflows.
    owner: needs-owner-confirmation
    system_scope: forseti.drupal
    code_paths:
      - sites/forseti/web/modules/custom/ai_conversation/src/Service/AIApiService.php
      - sites/forseti/config/sync/ai_conversation.settings.yml
    config_plane: drupal_config_plus_env_fallback
    secret_plane: env_or_active_drupal_config
    setup_doc: null
    verification_method: application-level AI conversation test or drush/runtime verification
    status: active
    risk_level: high

  - id: aws-billing
    name: AWS Cost Explorer Billing
    domain: billing
    purpose: Month-to-date AWS expense pulls for Forseti accounting.
    owner: accountant-forseti
    system_scope: copilot-hq.ops
    code_paths:
      - copilot-hq/runbooks/finance/expense-pulls.md
    config_plane: aws_cli_runtime
    secret_plane: aws_runtime_credentials
    setup_doc: copilot-hq/runbooks/finance/expense-pulls.md
    verification_method: aws ce get-cost-and-usage
    status: blocked
    risk_level: high

  - id: github-billing
    name: GitHub Billing API
    domain: billing
    purpose: Usage-based GitHub billing pulls for Forseti accounting.
    owner: accountant-forseti
    system_scope: copilot-hq.ops
    code_paths:
      - copilot-hq/runbooks/finance/expense-pulls.md
      - copilot-hq/runbooks/finance/billing-sources.md
    config_plane: server_token_file
    secret_plane: /home/ubuntu/github.token
    setup_doc: copilot-hq/runbooks/finance/expense-pulls.md
    verification_method: gh api /organizations/Forseti-Life/settings/billing/usage
    status: active
    risk_level: high

  - id: github-deploy
    name: GitHub Deploy Workflows
    domain: devops
    purpose: Production deploy and repository automation.
    owner: needs-owner-confirmation
    system_scope: org-wide.ops
    code_paths:
      - .github/workflows/deploy.yml
      - copilot-hq/.github/workflows/deploy.yml
    config_plane: github_actions_workflows
    secret_plane: github_actions_secrets_and_server_token_file
    setup_doc: null
    verification_method: GitHub Actions workflow run plus production verification
    status: active
    risk_level: high

