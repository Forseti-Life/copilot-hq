# Agents are named, reusable "seats" in the org.
# A human can play any role; Copilot can be delegated in sessions to act as an agent.

agents:
  # Executive
  - id: ceo-copilot
    name: "Copilot (CEO) — DEPRECATED"
    role: ceo
    supervisor: board
    website_scope: ["*"]
    paused: true
    notes: "DEPRECATED. Canonical CEO seat is ceo-copilot-2. Instructions stub only — do not dispatch work here."

  - id: ceo-copilot-2
    name: "Copilot (CEO)"
    role: ceo
    supervisor: board
    website_scope: ["*"]
    notes: "Canonical active CEO seat. All supervisor references point here."

  - id: ceo-copilot-3
    name: "Copilot (CEO) — Thread 3 — DEPRECATED"
    role: ceo
    supervisor: board
    website_scope: ["*"]
    paused: true
    notes: "DEPRECATED. Canonical CEO seat is ceo-copilot-2. Instructions stub only — do not dispatch work here."

  # Product Management (module-level ownership per website)
  - id: pm-infra
    name: "PM (infrastructure)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["infrastructure"]
    notes: "Owns system administration + security backlog; scope is cross-site infrastructure and anything outside website directories."

  - id: ba-infra
    name: "BA (infrastructure)"
    role: business-analyst
    supervisor: pm-infra
    website_scope: ["infrastructure"]

  - id: dev-infra
    name: "Dev (infrastructure)"
    role: software-developer
    supervisor: pm-infra
    website_scope: ["infrastructure"]

  - id: qa-infra
    name: "QA (infrastructure)"
    role: tester
    supervisor: pm-infra
    website_scope: ["infrastructure"]

  - id: agent-explore-infra
    name: "Explore Agent (infrastructure)"
    role: software-developer
    supervisor: pm-infra
    website_scope: ["infrastructure"]
    notes: "Acts like a user of operational/admin surfaces; asks PM questions; no code/doc edits."

  - id: sec-analyst-infra
    name: "Security Analyst (infrastructure)"
    role: security-analyst
    supervisor: pm-infra
    website_scope: ["infrastructure"]
    notes: "Acts like an adversarial user of operational/admin surfaces; reports safe repro + risk to PM; no code/doc edits."

  - id: pm-forseti
    name: "PM (forseti.life)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["forseti.life"]
    module_ownership: ["job_hunter", "jobhunter_tester", "company_research", "forseti_content"]

  - id: pm-dungeoncrawler
    name: "PM (dungeoncrawler)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["dungeoncrawler"]
    module_ownership: ["dungeoncrawler_content", "dungeoncrawler_tester"]

  - id: pm-stlouisintegration
    name: "PM (stlouisintegration.com)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["stlouisintegration.com"]
    module_ownership: []
    paused: true
    notes: "Paused: no planned modules/features (CEO decision 2026-02-21)"

  - id: pm-theoryofconspiracies
    name: "PM (theoryofconspiracies.com)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["theoryofconspiracies.com"]
    module_ownership: []
    paused: true
    notes: "Paused (CEO decision 2026-02-22)"

  - id: pm-thetruthperspective
    name: "PM (thetruthperspective.org)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["thetruthperspective.org"]
    module_ownership: []
    paused: true
    notes: "Paused (CEO decision 2026-02-22)"

  # Business Analysis (requirements bridge)
  - id: ba-forseti
    name: "BA (forseti.life)"
    role: business-analyst
    supervisor: pm-forseti
    website_scope: ["forseti.life"]

  - id: ba-dungeoncrawler
    name: "BA (dungeoncrawler)"
    role: business-analyst
    supervisor: pm-dungeoncrawler
    website_scope: ["dungeoncrawler"]

  - id: ba-stlouisintegration
    name: "BA (stlouisintegration.com)"
    role: business-analyst
    supervisor: pm-stlouisintegration
    website_scope: ["stlouisintegration.com"]
    paused: true
    notes: "Paused: no planned modules/features (CEO decision 2026-02-21)"

  - id: ba-theoryofconspiracies
    name: "BA (theoryofconspiracies.com)"
    role: business-analyst
    supervisor: pm-theoryofconspiracies
    website_scope: ["theoryofconspiracies.com"]
    paused: true
    notes: "Paused (CEO decision 2026-02-22)"

  - id: ba-thetruthperspective
    name: "BA (thetruthperspective.org)"
    role: business-analyst
    supervisor: pm-thetruthperspective
    website_scope: ["thetruthperspective.org"]
    paused: true
    notes: "Paused (CEO decision 2026-02-22)"

  # Engineering (implementation)
  - id: dev-forseti
    name: "Dev (forseti.life)"
    role: software-developer
    supervisor: pm-forseti
    website_scope: ["forseti.life"]

  - id: dev-dungeoncrawler
    name: "Dev (dungeoncrawler)"
    role: software-developer
    supervisor: pm-dungeoncrawler
    website_scope: ["dungeoncrawler"]

  # QA (verification)
  - id: qa-forseti
    name: "QA (forseti.life)"
    role: tester
    supervisor: pm-forseti
    website_scope: ["forseti.life"]

  - id: qa-dungeoncrawler
    name: "QA (dungeoncrawler)"
    role: tester
    supervisor: pm-dungeoncrawler
    website_scope: ["dungeoncrawler"]

  # Specialized Copilot execution modes (capability agents)
  - id: agent-explore
    name: "Explore Agent (DEPRECATED TEMPLATE — HQ only)"
    role: software-developer
    supervisor: ceo-copilot-2
    website_scope: ["infrastructure"]
    paused: true
    notes: "Deprecated template seat kept for legacy artifacts only. Keep paused. Use per-team explore seats (agent-explore-forseti, agent-explore-dungeoncrawler, agent-explore-infra). If ever unpaused, limit work to HQ/infrastructure file-review + queue follow-ups; no product UX exploration."

  - id: agent-explore-forseti
    name: "Explore Agent (forseti.life)"
    role: software-developer
    supervisor: pm-forseti
    website_scope: ["forseti.life"]
    notes: "Acts as a user: click around, read docs, and send needs-info questions to PM. No doc/code edits."

  - id: agent-explore-dungeoncrawler
    name: "Explore Agent (dungeoncrawler)"
    role: software-developer
    supervisor: pm-dungeoncrawler
    website_scope: ["dungeoncrawler"]
    notes: "Acts as a user: play the game, try the UI, read docs, and send needs-info questions to PM. No doc/code edits."

  - id: agent-code-review
    name: "Code Review Agent (org-wide capability)"
    role: tester
    supervisor: ceo-copilot-2
    website_scope: ["*"]
    notes: "Org-wide capability seat (not product-specific). Used by CEO across all products to scan diffs for high-impact issues (bugs/security/logic), not style."

  - id: agent-task-runner
    name: "Task Runner Agent (org-wide capability)"
    role: tester
    supervisor: ceo-copilot-2
    website_scope: ["*"]
    notes: "Org-wide capability seat (not product-specific). Used by CEO across all products to run builds/tests/lints with concise success output and full failure logs."

  # Security (proactive risk identification)
  - id: sec-analyst
    name: "Security Analyst (DEPRECATED TEMPLATE — HQ only)"
    role: security-analyst
    supervisor: ceo-copilot-2
    website_scope: ["infrastructure"]
    paused: true
    owns:
      - "Threat modeling"
      - "Security review findings"
      - "Vulnerability triage recommendations"
    notes: "Deprecated template seat kept for legacy artifacts only. Keep paused. Use per-team security seats (sec-analyst-forseti, sec-analyst-dungeoncrawler, sec-analyst-forseti-agent-tracker, sec-analyst-infra). If ever unpaused, limit work to HQ/infrastructure security review + queue follow-ups; no direct fixes unless explicitly delegated."

  - id: sec-analyst-forseti
    name: "Security Analyst (forseti.life)"
    role: security-analyst
    supervisor: pm-forseti
    website_scope: ["forseti.life"]
    notes: "Acts like an adversarial user to find breakages/abuse paths; reports questions/issues to PM. No doc/code edits."

  - id: sec-analyst-dungeoncrawler
    name: "Security Analyst (dungeoncrawler)"
    role: security-analyst
    supervisor: pm-dungeoncrawler
    website_scope: ["dungeoncrawler"]
    notes: "Acts like an adversarial user to find breakages/abuse paths; reports questions/issues to PM. No doc/code edits."

  - id: sec-analyst-forseti-agent-tracker
    name: "Security Analyst (forseti.life / agent tracker)"
    role: security-analyst
    supervisor: pm-forseti-agent-tracker
    website_scope: ["forseti.life"]
    notes: "Acts like an adversarial user against agent-tracker surfaces; reports questions/issues to PM. No doc/code edits."

  # Finance / FinOps
  - id: accountant-forseti
    name: "Accountant (forseti.life)"
    role: accountant
    supervisor: ceo-copilot-2
    website_scope: ["forseti.life"]
    notes: "CEO-supervised finance seat for Forseti. Tracks income and expenses across AWS, GitHub, payment systems, and related vendors; produces reconciliations, close summaries, forecasts, and control recommendations."

  # Forseti observability: agent tracking module
  - id: pm-forseti-agent-tracker
    name: "PM (forseti.life / agent tracker)"
    role: product-manager
    supervisor: ceo-copilot-2
    website_scope: ["forseti.life"]
    module_ownership: ["copilot_agent_tracker"]

  - id: ba-forseti-agent-tracker
    name: "BA (forseti.life / agent tracker)"
    role: business-analyst
    supervisor: pm-forseti-agent-tracker
    website_scope: ["forseti.life"]

  - id: dev-forseti-agent-tracker
    name: "Dev (forseti.life / agent tracker)"
    role: software-developer
    supervisor: pm-forseti-agent-tracker
    website_scope: ["forseti.life"]

  - id: qa-forseti-agent-tracker
    name: "QA (forseti.life / agent tracker)"
    role: tester
    supervisor: pm-forseti-agent-tracker
    website_scope: ["forseti.life"]

  # Open Source Initiative — making core products publicly available
  - id: pm-open-source
    name: "PM (Open Source Initiative)"
    role: project-manager
    supervisor: ceo-copilot-2
    website_scope: ["open-source"]
    notes: "Owns the open source publication roadmap. Tracks pre-publish blockers, repo readiness, community setup. Coordinates across dev/ba/qa."

  - id: ba-open-source
    name: "BA (Open Source Initiative)"
    role: business-analyst
    supervisor: pm-open-source
    website_scope: ["open-source"]
    notes: "Documents what each module does for external audiences. Writes contribution guidelines, architecture overviews, and README drafts."

  - id: dev-open-source
    name: "Dev (Open Source Initiative)"
    role: software-developer
    supervisor: pm-open-source
    website_scope: ["open-source"]
    notes: "Executes repo extraction, git history scrubbing (BFG), secrets removal, CI setup, and local dev environment tooling."

  - id: qa-open-source
    name: "QA (Open Source Initiative)"
    role: tester
    supervisor: pm-open-source
    website_scope: ["open-source"]
    notes: "Validates that each repo can be cloned and stood up from docs alone on a clean machine. Runs CI smoke tests."

  # Architect — hands-on technical builder (human-directed, no org operations)
  - id: architect-copilot
    name: "Architect (Copilot)"
    role: architect
    supervisor: board
    website_scope: ["*"]
    notes: "Human-directed technical builder. Full read/write authority across all repos. Not responsible for release management, orchestration, or org operations. Persona trigger: 'take on the Architect persona' or similar."
