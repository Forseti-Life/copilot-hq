# Repository ownership is defined at the repo / release-target level.
# Use this file for repository -> product/team routing.
# Each repository/release-target has exactly one owning product team.
# Use module-ownership.yaml for module-level splits within a product/site.
# Seat file scopes may allow work inside a repo, but do not create additional repo owners.

repositories:
  ai-conversation-push:
    github: "Forseti-Life/forseti-ai-conversation"
    local_path: "/root/ai-conversation-push"
    website_scope: "forseti.life"
    product_team: "forseti.life"
    repo_type: "push-clone"
    module: "ai_conversation"
    owning_pm: "pm-forseti"
    owning_dev: "dev-forseti"
    owning_qa: "qa-forseti"
    owning_security: "sec-analyst-forseti"
    notes: "Operational push/mirror repo used in release coordination."

  copilot-hq:
    github: "Forseti-Life/copilot-hq"
    local_path: "/home/ubuntu/forseti.life"
    website_scope: "forseti.life"
    product_team: "forseti.life / agent tracker"
    repo_type: "hq"
    module: "copilot_agent_tracker"
    owning_pm: "pm-forseti-agent-tracker"
    owning_dev: "dev-forseti-agent-tracker"
    owning_qa: "qa-forseti-agent-tracker"
    owning_security: "sec-analyst-forseti-agent-tracker"
    notes: "Canonical HQ working tree is the monorepo root `/home/ubuntu/forseti.life`. The nested `/home/ubuntu/forseti.life/copilot-hq` directory is a subtree/export artifact only and must not be treated as a second live repo root or inbox-scan root. Authoritative repo owner is the Forseti Agent Tracker team; other seats may work in this repo only within their explicitly defined seat-level file scopes."

