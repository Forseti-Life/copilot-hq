company: Copilot Sessions HQ
principles:
  - "Single seat per agent id (one inbox/outbox)."
  - "All roles follow org-wide instructions + their role-specific instructions."
  - "CEO ensures subordinates always have a concrete next task (active queue)."
  - "PM ensures BA/Dev/QA are unblocked and working to acceptance criteria."

authority:
  human_owner: "User"
  executive_agent: "ceo-copilot"
  notes: "Copilot agents act as delegates; the human owner retains final approval authority."

reporting_chain:
  - from: "User"
    to: "ceo-copilot"
    responsibility: "Orchestration, prioritization, enforcing protocol + clear audit trail."
  - from: "ceo-copilot"
    to: "pm-*"
    responsibility: "PMs own module-level scope + acceptance criteria; maintain active queues for subordinates."
  - from: "ceo-copilot"
    to: "accountant-*"
    responsibility: "Finance operations, expenditure tracking, vendor billing reconciliation, and cost reporting for leadership."
  - from: "pm-*"
    to: "ba-*"
    responsibility: "Requirements, analysis, documentation, status reporting."
  - from: "pm-*"
    to: "dev-*"
    responsibility: "Engineering lead/implementation: code, integration, design, verification steps."
  - from: "pm-*"
    to: "qa-*"
    responsibility: "QA test design + execution, independent verification, APPROVE/BLOCK."

roles:
  - ceo
  - software-developer
  - product-manager
  - business-analyst
  - tester
  - security-analyst
  - accountant

