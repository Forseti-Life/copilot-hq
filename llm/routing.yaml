# Execution Routing Configuration
# Controls which live inference backend each agent uses.
#
# Resolution order (first match wins):
#   1. agents.<agent-id>   — per-agent override (only needed when differing from role default)
#   2. roles.<role>        — role-based default
#   3. default             — org-wide fallback
#
# Supported live backends:
#   - lm_studio  — local Qwen (or any model) via LM Studio OpenAI-compatible API
#                  Requires LM Studio "Local Server" to be running.
#                  Override URL via LM_STUDIO_URL env var (default: http://localhost:1234/v1).
#                  Override model via LM_STUDIO_MODEL env var (default: whatever is loaded).
#                  Falls back to copilot/bedrock if the API is unreachable.
#   - copilot    — GitHub Copilot CLI
#   - bedrock    — AWS Bedrock

version: "1"

# Org-wide fallback if no role or agent match.
default: lm_studio

# Role-based defaults.
# CEO and software-developer stay on Copilot for highest-quality reasoning.
# All other roles route to LM Studio (local Qwen) by default.
roles:
  ceo: copilot
  product-manager: lm_studio
  software-developer: copilot
  tester: lm_studio
  business-analyst: lm_studio
  security-analyst: lm_studio

# Agent-specific overrides.
# Only list agents that need a DIFFERENT backend than their role default above.
# (qa-*, ba-*, sec-analyst-*, dev-*, pm-*, ceo-* are all handled by role defaults.)
agents:
  # Code review is structured analysis, not primary implementation.
  agent-code-review: bedrock

  # Explore agents do summarization/reading, not primary implementation.
  agent-explore: bedrock
  agent-explore-forseti: bedrock
  agent-explore-dungeoncrawler: bedrock
  agent-explore-infra: bedrock
