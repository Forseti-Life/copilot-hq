copilot_agent_tracker.langgraph_console_home:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::home'
    _title: 'LangGraph Console Home'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_build:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/build'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::build'
    _title: 'Build'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_test:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/test'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::test'
    _title: 'Test'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_run:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/run'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::run'
    _title: 'Run'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_observe:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/observe'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::observe'
    _title: 'Observe'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_release:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/release'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::release'
    _title: 'Release'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_admin:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/admin'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::admin'
    _title: 'Admin'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.langgraph_console_subsection:
  path: '/admin/reports/copilot-agent-tracker/langgraph-console/{section}/{subsection}'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\LangGraphConsoleStubController::subsection'
    _title: 'Subsection'
  requirements:
    _permission: 'administer copilot agent tracker'
    section: 'home|build|test|run|observe|release|admin'
    subsection: '[a-z0-9-]+'
