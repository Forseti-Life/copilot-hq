cancel_confirm:
  subject: 'Account Cancellation Request - [site:name]'
  body: "Hello [user:display-name],\r\n\r\nWe've received a request to cancel your Forseti account. We're sorry to see you go.\r\n\r\nTo confirm this cancellation, click the link below:\r\n\r\n[user:cancel-url]\r\n\r\n⚠️ IMPORTANT: This action is permanent and cannot be undone. All your data, preferences, and safety alerts will be removed.\r\n\r\nThis link expires in 24 hours. If you didn't request this, simply ignore this email and your account will remain active.\r\n\r\nStay safe,\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nBuilding safer communities through intelligent monitoring"
password_reset:
  subject: 'Password Reset Request - [site:name]'
  body: "Hello [user:display-name],\r\n\r\nWe received a request to reset your password for your Forseti account.\r\n\r\nClick the secure link below to set a new password:\r\n\r\n[user:one-time-login-url]\r\n\r\n🔒 Security Notice:\r\n- This link works only once\r\n- It expires in 24 hours\r\n- You'll be prompted to create a new password\r\n\r\nIf you didn't request this reset, please ignore this email. Your current password will remain unchanged.\r\n\r\nStay vigilant,\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nQuestions? Visit forseti.life/privacy-security"
register_admin_created:
  subject: 'Welcome to Forseti - Your Account is Ready'
  body: "Hello [user:display-name],\r\n\r\nWelcome to Forseti! A community safety administrator has created an account for you.\r\n\r\n🔑 Complete your account setup:\r\n\r\n[user:one-time-login-url]\r\n\r\nClick the link above to set your password and access your safety dashboard.\r\n\r\n📱 What you can do with Forseti:\r\n• View real-time crime maps for Philadelphia\r\n• Get AI-powered safety scores for any location\r\n• Receive alerts about incidents in your area\r\n• Access the AmISafe mobile app\r\n• Chat with Forseti AI for safety insights\r\n\r\nYour Login Credentials:\r\nUsername: [user:name]\r\nPassword: Set via the link above\r\n\r\nAfter setting your password, log in anytime at:\r\n[site:login-url]\r\n\r\nStay safe,\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nVigilance • Transparency • Justice • Community"
register_no_approval_required:
  subject: "Welcome to Forseti - Let's Get Started"
  body: "Hello [user:display-name],\r\n\r\nWelcome to Forseti! We're excited to have you join our community safety network.\r\n\r\n🚀 Activate your account now:\r\n\r\n[user:one-time-login-url]\r\n\r\nClick the link above to set your password and start exploring.\r\n\r\n🛡️ Your Safety Tools Await:\r\n• Live Crime Mapping - Real-time incident tracking across Philadelphia\r\n• AI Safety Scores - Get instant risk assessments for any location\r\n• H3 Geospatial Analysis - Precise neighborhood-level data\r\n• Mobile App Access - AmISafe for iOS & Android\r\n• Intelligent Alerts - Stay informed about your area\r\n• Chat with Forseti - AI-powered safety assistant\r\n\r\nYour Account Details:\r\nUsername: [user:name]\r\nSet your password via the secure link above\r\n\r\nFuture logins: [site:login-url]\r\n\r\n💡 New to Forseti?\r\n• Visit forseti.life/how-it-works to learn about our technology\r\n• Check out forseti.life/safety-map to explore Philadelphia crime data\r\n• Read our commitment to privacy at forseti.life/privacy-security\r\n\r\nTogether, we're building safer communities through intelligent monitoring and transparency.\r\n\r\nStay vigilant,\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nNamed after the Norse god of justice and peaceful resolution"
register_pending_approval:
  subject: 'Forseti Account Pending - Review in Progress'
  body: "Hello [user:display-name],\r\n\r\nThank you for registering with Forseti! Your application has been received.\r\n\r\n⏳ Your account is currently under review by our safety team. This helps us maintain a secure and trusted community.\r\n\r\nWhat happens next:\r\n• Our team will review your registration\r\n• You'll receive an email once approved (usually within 24 hours)\r\n• That email will contain your login credentials and next steps\r\n\r\nWhile you wait:\r\n• Explore forseti.life/safety-map (no login required)\r\n• Learn about our AI technology at forseti.life/how-it-works\r\n• Review our mission at forseti.life/about\r\n\r\nQuestions? Contact us at forseti.life/contact\r\n\r\nStay safe,\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nBuilding safer communities through vigilance and transparency"
register_pending_approval_admin:
  subject: '[ACTION REQUIRED] New User Registration - [user:display-name]'
  body: "🔔 New Forseti Account Registration\r\n\r\nUser Details:\r\nName: [user:display-name]\r\nUsername: [user:name]\r\nRegistration Time: [site:current-date]\r\n\r\nReview and approve this account:\r\n[user:edit-url]\r\n\r\nAs a Forseti administrator, please review this registration to ensure our community maintains the highest standards of safety and trust.\r\n\r\n---\r\nForseti Admin Team\r\n[site:name]"
status_activated:
  subject: '✓ Your Forseti Account is Active'
  body: "Hello [user:display-name],\r\n\r\nGreat news! Your Forseti account has been approved and activated.\r\n\r\n🎉 You're now part of our community safety network!\r\n\r\n🔑 Set your password and log in:\r\n\r\n[user:one-time-login-url]\r\n\r\nClick the secure link above to complete your setup.\r\n\r\n🛡️ What's Available Now:\r\n• Real-time crime mapping for Philadelphia\r\n• AI-powered safety assessments\r\n• Location-based alerts and notifications\r\n• Mobile app access (AmISafe)\r\n• Direct chat with Forseti AI\r\n• Personalized safety dashboard\r\n\r\nYour Login Information:\r\nUsername: [user:account-name]\r\nPassword: Set via the link above\r\n\r\nFuture logins: [site:login-url]\r\n\r\n📱 Download the AmISafe mobile app:\r\n• Available for iOS and Android\r\n• Get safety scores on the go\r\n• Real-time alerts wherever you are\r\n\r\nWelcome to safer, smarter community protection.\r\n\r\nStay vigilant,\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nVigilance • Transparency • Justice • Community"
status_blocked:
  subject: 'Forseti Account Status Update'
  body: "Hello [user:display-name],\r\n\r\nWe're writing to inform you that your Forseti account has been temporarily blocked.\r\n\r\n🔒 Account Status: Blocked\r\n\r\nThis action was taken to protect the integrity and security of our community safety platform.\r\n\r\nIf you believe this is an error or would like to discuss your account status, please contact our support team:\r\n• Visit: forseti.life/contact\r\n• Email: support@forseti.life\r\n\r\nWe take community safety seriously and are committed to fair resolution of all account matters.\r\n\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nCommitted to justice and transparency"
status_canceled:
  subject: 'Your Forseti Account Has Been Canceled'
  body: "Hello [user:display-name],\r\n\r\nYour Forseti account has been successfully canceled.\r\n\r\n✓ Account Status: Canceled\r\n✓ All personal data has been removed\r\n✓ You will no longer receive alerts or notifications\r\n\r\nWe're sorry to see you go. Your commitment to community safety matters to us.\r\n\r\n📝 What's Been Removed:\r\n• Login credentials\r\n• Saved locations and preferences\r\n• Alert subscriptions\r\n• Conversation history\r\n\r\nIf you change your mind, you can always create a new account at:\r\nforseti.life/user/register\r\n\r\nThank you for being part of our community. Stay safe out there.\r\n\r\nThe Forseti Team\r\n\r\n---\r\nForseti.life - AI Looking Out For Us\r\nBuilding safer communities through intelligent monitoring"
